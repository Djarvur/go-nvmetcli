name: Coverage Guard

on:
  push:
    branches:
      - main
      - 'dev/**'
      - 'feature/**'
  pull_request:

env:
  MIN_COVERAGE: "40"

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Run tests with coverage
        run: |
          go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Enforce coverage threshold
        env:
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${total}%"
          export COVERAGE_TOTAL="${total}"
          python <<'PY'
import os
import sys

total = float(os.environ["COVERAGE_TOTAL"])
threshold = float(os.environ["MIN_COVERAGE"])

if total < threshold:
    msg = f"Coverage {total:.2f}% is below threshold {threshold:.2f}%"
    print(f"::error::{msg}")
    sys.exit(1)
print(f"Coverage {total:.2f}% meets threshold {threshold:.2f}%")
PY

