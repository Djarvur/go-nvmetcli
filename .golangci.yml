run:
  timeout: 5m
  tests: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters-settings:
  depguard:
    rules:
      main:
        allow:
          - errors
          - fmt
          - os
          - github.com/Djarvur/go-nvmetcli/internal/nvmet
      nvmet:
        allow:
          - fmt
          - os
          - path/filepath
          - strconv
          - strings
          - encoding/json
          - github.com/google/uuid
          - github.com/chzyer/readline
          - bufio
          - github.com/Djarvur/go-nvmetcli/internal/nvmet
  
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  goconst:
    min-len: 2
    min-occurrences: 2
  
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  
  gocyclo:
    min-complexity: 15
  
  goimports:
    local-prefixes: github.com/Djarvur/go-nvmetcli
  
  mnd:
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign
  
  govet:
    enable-all: true
  
  lll:
    line-length: 120
  
  misspell:
    locale: US
  
  nakedret:
    max-func-lines: 30
  
  staticcheck:
    checks: ["all"]
  
  stylecheck:
    checks: ["all"]
    initialisms: ["ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "LHS", "QPS", "RAM", "RHS", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "UID", "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF", "XSS"]
  
  whitespace:
    multi-if: false
    multi-func: false

linters:
  enable-all: true
  disable:
    # Disable incompatible linters
    - typecheck  # Part of go build
    - gofumpt  # May conflict with gofmt/goimports
    - tenv  # Deprecated (since v1.64.0), replaced by usetesting

issues:
  exclude-dirs:
    - vendor
    - third_party
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
  uniq-by-line: true
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - funlen
        - gocognit
        - gocyclo
        - goconst
        - mnd
        - lll
        - testpackage
        - thelper
        - tparallel
        - paralleltest
        - usetesting
    - path: internal/.*
      linters:
        - depguard
    - path: cmd/.*
      linters:
        - depguard
  
  exclude:
    - Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
    - Error return value of .*\.(Write|Sync|Seek|Read|Truncate|Close|Flush) is not checked
    - "exported: exported (type|function|method|const) .* should have comment"
    - "package-comments: should have a package comment"
  
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default-severity: error
  case-sensitive: false
  rules:
    - linters:
        - errcheck
        - govet
        - staticcheck
        - typecheck
      severity: error
    - linters:
        - gocritic
        - revive
        - stylecheck
      severity: warning
    - linters:
        - gocyclo
        - mnd
        - lll
        - funlen
      severity: info
